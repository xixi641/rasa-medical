action_endpoint:
  actions_module: "actions"

nlg:
  type: rephrase
  llm:
    model_group: generate_models

model_groups:
  - id: generate_models
    models:
      - model: qwen3.6-flash-2026-04-16
        api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        api_key:  ${TONGYI_API_KEY}
        timeout: 15
        max_retries: 2
  - id: embedding_models
    models:
      - model: base-zh-v1.5
        api_base: "http://localhost:10010"
        api_key: ${TONGYI_API_KEY}

vector_store:
  neo4j_url: "neo4j://127.0.0.1"
  neo4j_auth:
    - neo4j
    - 12345678
